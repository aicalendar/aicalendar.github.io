<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Calendar</title>
    <link rel="icon" href="logo/logoweb.png" type="image/png"> 
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="authModal">
        <div class="modal-box">
            <h2>AI Calendar</h2>
            <p>Sign in to access your calendar</p>
            <button id="googleSignIn" class="auth-btn google-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                Continue with Google
            </button>
            <div class="auth-divider"><span>or</span></div>
            <input type="email" id="emailInput" placeholder="Email address" class="auth-input">
            <input type="password" id="passwordInput" placeholder="Password" class="auth-input">
            <button id="emailSignIn" class="auth-btn email-btn">Continue</button>
            <p id="authError" class="auth-error"></p>
            <p class="auth-switch">Don't have an account? <span id="switchToRegister">Register</span></p>
        </div>
    </div>

    <div id="mainContent" style="display: none;">
        
    <div id="viewSelector" class="dropdown">
        <button class="dropbtn" id="currentViewBtn">Year <span>&#9662;</span></button>
            <div class="dropdown-content">
                <a href="#" data-view="day">Day</a>
                <a href="#" data-view="month">Month</a>
                <a href="#" data-view="year">Year</a>
            </div>
        </div>

        <div id="userBar">
            <span id="userInfo"></span> 
            <img id="userProfilePic" src="" alt="Profile Picture" style="display: none;">
            <button id="signOutBtn">Sign out</button>
        </div> 

        <div id="app-container"></div>
    </div>

    <footer class="footer">
        Produced by <a href="https://github.com/kotsalosk" style="color: #0805cf; text-decoration: none;">kotsalosk</a>
    </footer>

    <script type="module" src="app.js"></script>
    
</body>
</html>
